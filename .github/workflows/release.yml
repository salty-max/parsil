name: Release

# Manual release flow: triggered by pushing a vX.Y.Z tag, never by a
# push to main. The maintainer runs `bun changeset:version` locally to
# bump versions + write CHANGELOG.md, commits, tags, and pushes the
# tag. This workflow consumes the tag and ships the release.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Extract version + release notes
        id: notes
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG_NAME#v}"
          echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Pull the section for this version out of CHANGELOG.md so
          # the GitHub Release body matches the changelog entry exactly.
          # The CHANGELOG starts a version with `## X.Y.Z`; we cut from
          # that line up to (but not including) the next `## ` line.
          if [ -f CHANGELOG.md ]; then
            awk -v v="$VERSION" '
              /^## / {
                if (found) { exit }
                if ($2 == v) { found = 1; next }
              }
              found { print }
            ' CHANGELOG.md > release-notes.md
          else
            echo "_No CHANGELOG.md found; release notes generated from tag only._" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.notes.outputs.tag }}
          name: Release ${{ steps.notes.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false

      - name: Setup Node.js for NPM
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Bump npm to a version that supports OIDC trusted publishing.
      # Node 22 ships with npm 10.x, which is older than what npm
      # requires (>= 11.5.1). This is a no-op once Node ships a newer
      # bundled npm.
      - name: Update npm
        run: npm install -g npm@latest

      # Trusted Publishing: npm verifies the workflow's OIDC token
      # against the configured trusted publisher on npmjs.com. No
      # secret needed; the `id-token: write` permission above is what
      # makes the OIDC token available.
      - name: Publish to NPM
        run: npm publish --provenance
